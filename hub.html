<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POF 2828 — Hotkeys, Hotstrings & Services</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0e17; color: #c8d6e5; }

/* ── Tabs ── */
.tabs { display: flex; background: #111827; border-bottom: 1px solid #1e2a3a; padding: 0 8px; }
.tab {
  padding: 10px 18px; font-size: 13px; cursor: pointer; border: none;
  background: transparent; color: #6a7a8a; font-family: inherit; font-weight: 500;
  border-bottom: 2px solid transparent; transition: all 0.15s;
}
.tab:hover { color: #a0b0c0; }
.tab.active { color: #e0e8f0; border-bottom-color: #3b82f6; }

/* ── Panels ── */
.panel { display: none; padding: 20px; }
.panel.active { display: flex; gap: 24px; }

/* ── Left Form ── */
.form-col { width: 400px; flex-shrink: 0; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #7a8a9a; margin-bottom: 4px; font-weight: 600; }
select, input[type=text], textarea {
  width: 100%; background: #1a2332; border: 1px solid #2a3a4a; color: #e0e8f0;
  padding: 8px 10px; border-radius: 6px; font-family: inherit; font-size: 13px;
}
select:focus, input:focus, textarea:focus { outline: none; border-color: #3b82f6; }
textarea { height: 120px; resize: vertical; font-family: 'Consolas', monospace; font-size: 12px; }

.mod-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.mod-row label { display: flex; align-items: center; gap: 4px; font-size: 13px; color: #a0b0c0; cursor: pointer; }
.mod-row input[type=checkbox] { accent-color: #3b82f6; }

.btn-row { display: flex; gap: 8px; margin-top: 16px; }
.btn {
  padding: 8px 18px; border-radius: 6px; border: 1px solid #2a3a4a;
  font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
  transition: all 0.15s;
}
.btn-primary { background: #1d4ed8; color: #dbeafe; border-color: #1d4ed8; }
.btn-primary:hover { background: #2563eb; }
.btn-test { background: #065f46; color: #a7f3d0; border-color: #065f46; }
.btn-test:hover { background: #047857; }
.btn-danger { background: #7f1d1d; color: #fecaca; border-color: #7f1d1d; }
.btn-danger:hover { background: #991b1b; }
.btn-export { background: #1e2a3a; color: #93c5fd; }
.btn-export:hover { background: #253545; }

/* ── Right Table ── */
.table-col { flex: 1; min-width: 0; }
.table-col h3 { font-size: 14px; color: #7a8a9a; margin-bottom: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 8px 10px; background: #111827; color: #7a8a9a; font-weight: 600; border-bottom: 1px solid #2a3a4a; }
td { padding: 7px 10px; border-bottom: 1px solid #151f2e; color: #b0c0d0; }
tr { cursor: pointer; transition: background 0.1s; }
tr:hover { background: #151f2e; }
tr.selected { background: #1a2a4a; }
td.type-badge span {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
}
.badge-hotkey { background: #1e3a5f; color: #60a5fa; }
.badge-hotstring { background: #3b1f0f; color: #fb923c; }

/* ── Status bar ── */
.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #111827; border-top: 1px solid #1e2a3a;
  padding: 6px 16px; display: flex; justify-content: space-between;
  font-size: 12px; color: #5a6a7a;
}
.status-bar .enable-row { display: flex; gap: 16px; }
.status-bar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }

/* ── Services panel ── */
.svc-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px; width: 100%;
}
.svc-card {
  background: #111827; border: 1px solid #1e2a3a; border-radius: 8px;
  padding: 14px 16px;
}
.svc-top { display: flex; justify-content: space-between; align-items: center; }
.svc-name { font-size: 13px; font-weight: 600; }
.svc-port { font-size: 11px; color: #5a7a9a; font-family: monospace; background: #0d1520; padding: 2px 8px; border-radius: 10px; }
.svc-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.svc-dot.on { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
.svc-dot.off { background: #ef4444; box-shadow: 0 0 4px #ef4444; }
.svc-desc { font-size: 11px; color: #5a6a7a; margin-top: 6px; }
.svc-actions { margin-top: 10px; display: flex; gap: 6px; }
.svc-btn { padding: 4px 12px; border-radius: 4px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; }
.svc-start { background: #166534; color: #bbf7d0; }
.svc-stop { background: #7f1d1d; color: #fecaca; }
.svc-btn:disabled { opacity: 0.3; cursor: not-allowed; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="showTab('shortcuts')">Shortcuts</button>
  <button class="tab" onclick="showTab('services')">Services</button>
  <button class="tab" onclick="showTab('hotstrings')">Hotstrings</button>
  <button class="tab" onclick="showTab('tts')">TTS</button>
  <button class="tab" onclick="showTab('clips')">Clip Slots</button>
  <button class="tab" onclick="showTab('config')">Raw Config</button>
</div>

<!-- ═══ SHORTCUTS TAB ═══ -->
<div id="tab-shortcuts" class="panel active">
  <div class="form-col">
    <div class="form-group">
      <label>Type:</label>
      <select id="hk-type"><option>Hotkey</option><option>Hotstring</option></select>
    </div>
    <div class="form-group">
      <label>Modifiers:</label>
      <div class="mod-row">
        <label><input type="checkbox" id="mod-ctrl"> Ctrl</label>
        <label><input type="checkbox" id="mod-alt"> Alt</label>
        <label><input type="checkbox" id="mod-shift"> Shift</label>
        <label><input type="checkbox" id="mod-win"> Win</label>
      </div>
    </div>
    <div class="form-group">
      <label>Key:</label>
      <input type="text" id="hk-key" placeholder="e.g. C, F1, Space">
    </div>
    <div class="form-group">
      <label>Action:</label>
      <select id="hk-action">
        <option value="toggle_panel">Toggle Panel</option>
        <option value="tts_read_selection">TTS Read Selection</option>
        <option value="paste_slot">Paste Clip Slot</option>
        <option value="ai_rewrite_selection">AI Rewrite Selection</option>
        <option value="send_text">Send Text</option>
      </select>
    </div>
    <div class="form-group">
      <label>Panel / Target:</label>
      <input type="text" id="hk-target" placeholder="e.g. clipboard, dashboard">
    </div>
    <div class="form-group">
      <label>Description:</label>
      <input type="text" id="hk-desc" placeholder="">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addHotkey()">Add / Save</button>
      <button class="btn btn-danger" onclick="deleteSelected()">Delete</button>
      <button class="btn btn-export" onclick="exportAhk()">Export .ahk</button>
    </div>
  </div>
  <div class="table-col">
    <h3>Library</h3>
    <table>
      <thead><tr><th>Type</th><th>Trigger</th><th>Action</th><th>Target</th></tr></thead>
      <tbody id="hk-table"></tbody>
    </table>
  </div>
</div>

<!-- ═══ SERVICES TAB ═══ -->
<div id="tab-services" class="panel">
  <div class="svc-grid" id="svc-grid" style="width:100%"></div>
</div>

<!-- ═══ HOTSTRINGS TAB ═══ -->
<div id="tab-hotstrings" class="panel">
  <div class="form-col">
    <div class="form-group"><label>Trigger (e.g. /OBS):</label><input type="text" id="hs-trigger"></div>
    <div class="form-group"><label>Expansion:</label><textarea id="hs-expansion" style="height:80px"></textarea></div>
    <div class="form-group">
      <label><input type="checkbox" id="hs-replace" checked> Replace trigger text</label>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addHotstring()">Add / Save</button>
      <button class="btn btn-danger" onclick="deleteHotstring()">Delete</button>
    </div>
  </div>
  <div class="table-col">
    <h3>Hotstrings Library</h3>
    <table>
      <thead><tr><th>Trigger</th><th>Expansion</th><th>Replace</th></tr></thead>
      <tbody id="hs-table"></tbody>
    </table>
  </div>
</div>

<!-- ═══ TTS TAB ═══ -->
<div id="tab-tts" class="panel">
  <div class="form-col">
    <div class="form-group"><label>Engine:</label>
      <select id="tts-engine"><option value="sapi">SAPI (Windows)</option><option value="edge">Edge TTS (Neural)</option></select>
    </div>
    <div class="form-group"><label>Voice:</label><input type="text" id="tts-voice" placeholder="e.g. Brian, en-US-AriaNeural"></div>
    <div class="form-group"><label>Speed (-10 to 10):</label><input type="text" id="tts-speed" value="2"></div>
    <div class="form-group"><label>Volume (0-100):</label><input type="text" id="tts-volume" value="100"></div>
    <div class="btn-row"><button class="btn btn-primary" onclick="saveTts()">Save TTS Settings</button></div>
  </div>
</div>

<!-- ═══ CLIP SLOTS TAB ═══ -->
<div id="tab-clips" class="panel">
  <div style="width:100%">
    <h3 style="margin-bottom:12px;color:#7a8a9a">Clipboard Slots (Ctrl+Shift+1-0)</h3>
    <div id="clip-slots"></div>
  </div>
</div>

<!-- ═══ RAW CONFIG TAB ═══ -->
<div id="tab-config" class="panel">
  <div style="width:100%">
    <textarea id="raw-config" style="width:100%;height:calc(100vh - 140px);font-family:Consolas,monospace;font-size:12px;background:#0d1520;color:#93c5fd;border:1px solid #1e2a3a;padding:12px;border-radius:8px"></textarea>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-primary" onclick="saveRawConfig()">Save Config</button>
      <button class="btn btn-export" onclick="reloadConfig()">Reload</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="enable-row">
    <label><input type="checkbox" id="en-hotkeys" checked> Enable Hotkeys</label>
    <label><input type="checkbox" id="en-hotstrings" checked> Enable Hotstrings</label>
  </div>
  <span id="status-text">Loading...</span>
</div>


<script>
const CONFIG_PATH = 'C:\\Users\\lowes\\Desktop\\Theophysics-OS-clone\\nerve-full-fix-package\\live_install\\config\\config.json';
let config = null;
let selectedHkIdx = -1;
let selectedHsIdx = -1;

// ── Tab switching ──
function showTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'services') loadServices();
}

// ── Load config via service_manager API ──
async function loadConfig() {
  try {
    const r = await fetch('/api/nerve-config');
    config = await r.json();
    renderHotkeys();
    renderHotstrings();
    renderTts();
    renderClipSlots();
    document.getElementById('raw-config').value = JSON.stringify(config, null, 2);
    document.getElementById('status-text').textContent =
      `Ready — ${config.hotkeys?.length || 0} hotkeys, ${config.hotstrings?.length || 0} hotstrings`;
  } catch(e) {
    // Fallback: try loading from embedded default
    document.getElementById('status-text').textContent = 'Config API unavailable — read-only mode';
  }
}

// ── Render hotkeys table ──
function renderHotkeys() {
  const tb = document.getElementById('hk-table');
  tb.innerHTML = (config.hotkeys || []).map((h, i) => {
    const type = h.keys.includes('Shift') && /\d/.test(h.keys) ? 'Slot' : 'Hotkey';
    return `<tr class="${i === selectedHkIdx ? 'selected' : ''}" onclick="selectHk(${i})">
      <td class="type-badge"><span class="badge-hotkey">${type}</span></td>
      <td style="font-family:monospace;color:#60a5fa">${h.keys}</td>
      <td>${h.action}</td>
      <td>${h.action.replace('toggle_','').replace('paste_slot_','Slot ')}</td>
    </tr>`;
  }).join('');
}

function selectHk(i) {
  selectedHkIdx = i;
  const h = config.hotkeys[i];
  document.getElementById('mod-ctrl').checked = h.keys.includes('Ctrl');
  document.getElementById('mod-alt').checked = h.keys.includes('Alt');
  document.getElementById('mod-shift').checked = h.keys.includes('Shift');
  document.getElementById('mod-win').checked = h.keys.includes('Win');
  const parts = h.keys.split('+');
  document.getElementById('hk-key').value = parts[parts.length - 1];
  document.getElementById('hk-target').value = h.action.replace('toggle_','');
  renderHotkeys();
}

function addHotkey() {
  let keys = [];
  if (document.getElementById('mod-ctrl').checked) keys.push('Ctrl');
  if (document.getElementById('mod-alt').checked) keys.push('Alt');
  if (document.getElementById('mod-shift').checked) keys.push('Shift');
  if (document.getElementById('mod-win').checked) keys.push('Win');
  keys.push(document.getElementById('hk-key').value);
  const combo = keys.join('+');
  const action = document.getElementById('hk-action').value === 'toggle_panel'
    ? 'toggle_' + document.getElementById('hk-target').value
    : document.getElementById('hk-action').value;
  if (selectedHkIdx >= 0) {
    config.hotkeys[selectedHkIdx] = { keys: combo, action };
  } else {
    config.hotkeys.push({ keys: combo, action });
  }
  selectedHkIdx = -1;
  renderHotkeys();
  saveConfig();
}

function deleteSelected() {
  if (selectedHkIdx < 0) return;
  config.hotkeys.splice(selectedHkIdx, 1);
  selectedHkIdx = -1;
  renderHotkeys();
  saveConfig();
}

// ── Hotstrings ──
function renderHotstrings() {
  const tb = document.getElementById('hs-table');
  tb.innerHTML = (config.hotstrings || []).map((h, i) => `
    <tr class="${i === selectedHsIdx ? 'selected' : ''}" onclick="selectHs(${i})">
      <td style="font-family:monospace;color:#fb923c">${h.trigger}</td>
      <td>${h.expansion.substring(0, 60)}${h.expansion.length > 60 ? '...' : ''}</td>
      <td>${h.replace_trigger ? 'Yes' : 'No'}</td>
    </tr>
  `).join('');
}

function selectHs(i) {
  selectedHsIdx = i;
  document.getElementById('hs-trigger').value = config.hotstrings[i].trigger;
  document.getElementById('hs-expansion').value = config.hotstrings[i].expansion;
  document.getElementById('hs-replace').checked = config.hotstrings[i].replace_trigger;
  renderHotstrings();
}

function addHotstring() {
  const hs = {
    trigger: document.getElementById('hs-trigger').value,
    expansion: document.getElementById('hs-expansion').value,
    replace_trigger: document.getElementById('hs-replace').checked
  };
  if (selectedHsIdx >= 0) { config.hotstrings[selectedHsIdx] = hs; }
  else { config.hotstrings.push(hs); }
  selectedHsIdx = -1;
  renderHotstrings();
  saveConfig();
}

function deleteHotstring() {
  if (selectedHsIdx < 0) return;
  config.hotstrings.splice(selectedHsIdx, 1);
  selectedHsIdx = -1;
  renderHotstrings();
  saveConfig();
}

// ── TTS ──
function renderTts() {
  if (!config.tts) return;
  document.getElementById('tts-engine').value = config.tts.engine || 'sapi';
  document.getElementById('tts-voice').value = config.tts.voice || 'default';
  document.getElementById('tts-speed').value = config.tts.speed || 2;
  document.getElementById('tts-volume').value = config.tts.volume || 100;
}

function saveTts() {
  config.tts = {
    voice: document.getElementById('tts-voice').value,
    speed: parseInt(document.getElementById('tts-speed').value),
    engine: document.getElementById('tts-engine').value,
    volume: parseInt(document.getElementById('tts-volume').value)
  };
  saveConfig();
}

// ── Clip Slots ──
function renderClipSlots() {
  const el = document.getElementById('clip-slots');
  el.innerHTML = (config.clip_slots || []).map((s, i) => `
    <div style="margin-bottom:8px;background:#111827;border:1px solid #1e2a3a;border-radius:6px;padding:10px">
      <div style="font-size:11px;color:#5a6a7a;margin-bottom:4px">
        Ctrl+Shift+${(i+1) % 10} — ${new Date(parseInt(s.timestamp)*1000).toLocaleString()}
      </div>
      <div style="font-size:12px;color:#b0c0d0;max-height:60px;overflow:hidden;font-family:monospace">
        ${s.content.substring(0, 200).replace(/</g,'&lt;')}${s.content.length > 200 ? '...' : ''}
      </div>
    </div>
  `).join('');
}

// ── Services ──
async function loadServices() {
  try {
    const r = await fetch('/api/status');
    const svcs = await r.json();
    document.getElementById('svc-grid').innerHTML = svcs.map(s => `
      <div class="svc-card">
        <div class="svc-top">
          <div><span class="svc-dot ${s.alive?'on':'off'}"></span><span class="svc-name">${s.name}</span></div>
          <span class="svc-port">:${s.port}</span>
        </div>
        <div class="svc-desc">${s.desc}</div>
        ${s.manageable ? `<div class="svc-actions">
          <button class="svc-btn svc-start" onclick="fetch('/api/start?id=${s.id}').then(()=>loadServices())" ${s.alive?'disabled':''}>Start</button>
          <button class="svc-btn svc-stop" onclick="fetch('/api/stop?id=${s.id}').then(()=>loadServices())" ${!s.alive?'disabled':''}>Stop</button>
        </div>` : ''}
      </div>
    `).join('');
  } catch(e) {}
}

// ── Save / reload config ──
async function saveConfig() {
  try {
    await fetch('/api/nerve-config', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(config)
    });
    document.getElementById('status-text').textContent =
      `Saved — ${config.hotkeys?.length || 0} hotkeys, ${config.hotstrings?.length || 0} hotstrings`;
    document.getElementById('raw-config').value = JSON.stringify(config, null, 2);
  } catch(e) {
    document.getElementById('status-text').textContent = 'Save failed: ' + e.message;
  }
}

function saveRawConfig() {
  try {
    config = JSON.parse(document.getElementById('raw-config').value);
    renderHotkeys(); renderHotstrings(); renderTts(); renderClipSlots();
    saveConfig();
  } catch(e) {
    document.getElementById('status-text').textContent = 'Invalid JSON: ' + e.message;
  }
}

function reloadConfig() { loadConfig(); }

// ── Export .ahk ──
function exportAhk() {
  let ahk = '; POF 2828 Hotkeys — Auto-generated\n#SingleInstance Force\n\n';
  for (const h of config.hotkeys || []) {
    const k = h.keys.replace('Ctrl+','^').replace('Alt+','!').replace('Shift+','+').replace('Win+','#');
    ahk += `${k}::\n  ; Action: ${h.action}\nreturn\n\n`;
  }
  for (const h of config.hotstrings || []) {
    const opt = h.replace_trigger ? '*' : '';
    ahk += `::${opt}${h.trigger}::${h.expansion}\n`;
  }
  const blob = new Blob([ahk], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'POF2828_hotkeys.ahk';
  a.click();
}

// ── Init ──
loadConfig();
</script>
</body>
</html>
