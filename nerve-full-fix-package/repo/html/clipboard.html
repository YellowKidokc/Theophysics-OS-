<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipSync</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --border: #2a2a4a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #60d0ff;
    --accent-hover: #80e0ff;
    --slot-bg: #1e1e3a;
    --pin-color: #ffd700;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    flex: 1;
  }

  .header .status {
    font-size: 12px;
    color: var(--text-dim);
  }

  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4caf50;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* Search */
  .search-bar {
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .search-bar input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }

  .search-bar input:focus {
    border-color: var(--accent);
  }

  .search-bar input::placeholder {
    color: var(--text-dim);
  }

  /* Slot bar */
  .slot-bar {
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow-x: auto;
  }

  .slot {
    min-width: 36px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--slot-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .slot:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .slot.filled {
    color: var(--text);
    background: var(--surface);
  }

  .slot.active {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 8px rgba(96, 208, 255, 0.2);
  }

  /* Clip list */
  .clip-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .clip-list::-webkit-scrollbar {
    width: 6px;
  }

  .clip-list::-webkit-scrollbar-track {
    background: var(--bg);
  }

  .clip-list::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  .clip-item {
    padding: 10px 14px;
    margin-bottom: 4px;
    background: var(--surface);
    border: 1px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .clip-item:hover {
    border-color: var(--border);
    background: var(--surface2);
  }

  .clip-item.pinned {
    border-left: 3px solid var(--pin-color);
  }

  .clip-content {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 120px;
    overflow: hidden;
  }

  .clip-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .clip-tags {
    display: flex;
    gap: 4px;
  }

  .tag {
    padding: 1px 8px;
    background: var(--border);
    border-radius: 10px;
    font-size: 11px;
    color: var(--accent);
  }

  .clip-actions {
    position: absolute;
    top: 8px;
    right: 8px;
    display: none;
    gap: 4px;
  }

  .clip-item:hover .clip-actions {
    display: flex;
  }

  .clip-actions button {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    padding: 2px 6px;
    font-size: 11px;
    cursor: pointer;
  }

  .clip-actions button:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Footer */
  .footer {
    padding: 8px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: var(--bg);
    padding: 6px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.2s;
    pointer-events: none;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="header">
  <h1>ClipSync</h1>
  <span class="status"><span class="status-dot"></span>Monitoring</span>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search clips... (Ctrl+F)" />
</div>

<div class="slot-bar" id="slots"></div>

<div class="clip-list" id="clipList"></div>

<div class="footer">
  <span id="clipCount">0 clips</span>
  <span>Ctrl+Shift+1-0 to paste</span>
</div>

<div class="toast" id="toast"></div>

<script>
  // Clip data (will be populated from the Rust agent via IPC or API)
  let clips = [];
  let searchTerm = '';

  // Initialize slots
  function renderSlots() {
    const bar = document.getElementById('slots');
    bar.innerHTML = '';
    for (let i = 1; i <= 10; i++) {
      const slot = document.createElement('div');
      slot.className = 'slot' + (clips.length >= i ? ' filled' : '');
      slot.textContent = i === 10 ? '0' : i;
      slot.title = clips[i-1] ? clips[i-1].content.substring(0, 80) : 'Empty';
      slot.onclick = () => pasteSlot(i - 1);
      bar.appendChild(slot);
    }
  }

  // Render clip list
  function renderClips() {
    const list = document.getElementById('clipList');
    const filtered = clips.filter(c =>
      !searchTerm || c.content.toLowerCase().includes(searchTerm.toLowerCase())
    );

    list.innerHTML = filtered.map((clip, i) => `
      <div class="clip-item ${clip.pinned ? 'pinned' : ''}" onclick="copyClip(${i})">
        <div class="clip-content">${escapeHtml(clip.content)}</div>
        <div class="clip-meta">
          <span>${clip.timestamp || 'just now'}</span>
          <div class="clip-tags">
            ${(clip.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
        </div>
        <div class="clip-actions">
          <button onclick="event.stopPropagation(); pinClip(${i})">${clip.pinned ? 'Unpin' : 'Pin'}</button>
          <button onclick="event.stopPropagation(); deleteClip(${i})">Del</button>
        </div>
      </div>
    `).join('');

    document.getElementById('clipCount').textContent = `${filtered.length} clips`;
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function copyClip(index) {
    const clip = clips[index];
    if (clip) {
      navigator.clipboard.writeText(clip.content);
      showToast('Copied!');
    }
  }

  function pasteSlot(index) {
    if (clips[index]) {
      navigator.clipboard.writeText(clips[index].content);
      showToast(`Slot ${index + 1} copied`);
    }
  }

  function pinClip(index) {
    clips[index].pinned = !clips[index].pinned;
    renderClips();
  }

  function deleteClip(index) {
    clips.splice(index, 1);
    renderClips();
    renderSlots();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1200);
  }

  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderClips();
  });

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'f') {
      e.preventDefault();
      document.getElementById('search').focus();
    }
  });

  // Demo data (will be replaced by real data from the agent)
  clips = [
    { content: 'Welcome to ClipSync! Copy something to get started.', timestamp: 'just now', tags: ['system'], pinned: false },
  ];

  renderSlots();
  renderClips();

  // Listen for messages from the Rust agent (WebView2 IPC)
  // window.chrome.webview.addEventListener('message', (e) => { ... });
</script>
</body>
</html>
